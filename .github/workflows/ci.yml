name: CI & Deploy

# push / PR でビルド + レンダースモークテストを実行し、main への push 時のみ
# UI モック（site/）を GitHub Pages へ自動デプロイする。
# テスト（スモーク）が落ちるとデプロイされない ＝ 公開物は常にビルド通過済み。

on:
  push:
    branches: [main, dev, "feature/**"]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Test & build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Cache JUCE (FetchContent)
        uses: actions/cache@v4
        with:
          path: build-ci/_deps
          key: juce-8.0.12-${{ runner.os }}

      - name: Configure (Release)
        run: cmake -S . -B build-ci -DCMAKE_BUILD_TYPE=Release

      - name: Build headless renderer
        run: cmake --build build-ci --target RdhRender --parallel 3

      - name: Render smoke test (preset -> WAV, must be non-silent)
        run: |
          ./build-ci/RdhRender_artefacts/Release/RdhRender \
            test_presets/test-4op-algo0-chain.rdhs smoke.wav --secs 1 --poly 2
          python3 - smoke.wav <<'PY'
          import sys, wave
          w = wave.open(sys.argv[1], "rb"); n = w.getnframes(); raw = w.readframes(n); w.close()
          peak = max((abs(int.from_bytes(raw[i:i+3], "little", signed=True))
                      for i in range(0, len(raw), 3)), default=0)
          assert n > 0 and peak > 1000, f"silent or empty render: frames={n} peak={peak}"
          print(f"smoke OK: frames={n} peak={peak} ({peak/8388607:.1%} FS)")
          PY

      - name: Assemble Pages site (UI mockup)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          rm -rf _site && mkdir -p _site
          cp -R site/. _site/
          touch _site/.nojekyll

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy mock to GitHub Pages
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
